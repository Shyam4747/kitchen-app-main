apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-db
  template:
    metadata:
      labels:
        app: kitchen-db
    spec:
      containers:
      - name: mongodb
        image: mongo:6
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-db
spec:
  selector:
    app: kitchen-db
  ports:
  - port: 27017
    targetPort: 27017