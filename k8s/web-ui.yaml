apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-web-ui
  template:
    metadata:
      labels:
        app: kitchen-web-ui
    spec:
      containers:
      - name: kitchen-web-ui
        image: kitchen-web:local
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-web-ui
spec:
  type: NodePort
  selector:
    app: kitchen-web-ui
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007